const CASTLE_X=LW-380, DIP_X=CASTLE_X+90, DIP_Y=GY-TILE*4;

let platforms,enemies,coins,toadItems,particles,player,camX,state,dTimer,score,jumpPrev;

function init(){
  platforms=buildPlatforms(); enemies=buildEnemies();
  coins=buildCoins(); toadItems=[]; particles=[];
  player={x:80,y:GY-TILE,w:32,h:32,vx:0,vy:0,onGround:false,
           speed:230,jumpF:-490,dead:false,facingR:true,
           hasToad:false,invincible:0};

// ============================================================
// PHYSIQUE
// ============================================================
function overlaps(a,b){
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

function brickParticles(bx,by){
  for(let i=0;i<6;i++) particles.push({
    x:bx+16,y:by+16,
    vx:(Math.random()-0.5)*220, vy:-Math.random()*280-80,
    life:0.7,maxLife:0.7,col:'#c0392b',sz:7
  });
}

function coinParticle(cx,cy){
  particles.push({x:cx,y:cy,vx:0,vy:-230,life:0.55,maxLife:0.55,col:'#FFD700',sz:12});
}

function resolveCol(dt){
  const solid=[...platforms,...PIPES];
  player.x+=player.vx*dt;
  for(const p of solid){
    if(p.type==='brick'&&!p.intact) continue;
    if(overlaps(player,p)){
      if(player.vx>0) player.x=p.x-player.w;
      else            player.x=p.x+p.w;
      player.vx=0;
    }
  }
  player.onGround=false;
  player.y+=player.vy*dt;
  for(const p of solid){
    if(p.type==='brick'&&!p.intact) continue;
    if(overlaps(player,p)){
      if(player.vy>0){ player.y=p.y-player.h; player.onGround=true; }
      else{
        // touché par en dessous
        if(p.type==='qmark'&&!p.hit){
          p.hit=true; score+=10;
          if(Math.random()<0.15){
            toadItems.push({x:p.x,y:p.y-TILE,w:TILE,h:TILE,vy:-200,onGround:false,col:false});
          } else {
            coinParticle(p.x+16,p.y); score+=5;
          }
        } else if(p.type==='brick'&&p.intact&&player.hasToad){
          p.intact=false; score+=20; brickParticles(p.x,p.y);
        }
        player.y=p.y+p.h;
      }
      player.vy=0;
    }
  }
}

// ============================================================
// BOUCLE DE JEU
// ============================================================
let lastTs=0;
function update(ts){
  requestAnimationFrame(update);
  const dt=Math.min((ts-lastTs)/1000,0.05); lastTs=ts;

  if(state==='start'||state==='win'||state==='dead'){ draw(); return; }
  if(state==='dying'){ dTimer-=dt; if(dTimer<=0) state='dead'; draw(); return; }

  if(player.invincible>0) player.invincible-=dt;

  // Joueur
  if(!player.dead){
    if(isLeft())  { player.vx-=player.speed*dt*15; player.facingR=false; }
    if(isRight()) { player.vx+=player.speed*dt*15; player.facingR=true;  }
    const jNow=isJump();
    if(jNow&&!jumpPrev&&player.onGround){ player.vy=player.jumpF; player.onGround=false; }
    jumpPrev=jNow;
    player.vx=Math.max(-player.speed,Math.min(player.speed,player.vx));
    player.vx*=Math.pow(FRICTION,dt*60);
    player.vy+=GRAVITY*dt;
    resolveCol(dt);
    player.x=Math.max(0,Math.min(LW-player.w,player.x));
    if(player.y>CH+100){ player.dead=true; state='dying'; dTimer=1.5; }
    if(overlaps(player,{x:DIP_X,y:DIP_Y,w:64,h:32})) state='win';
    camX=Math.max(0,Math.min(player.x-CW/3,LW-CW));
  }

  // Ennemis
  for(const e of enemies){
    if(!e.alive) continue;
    e.x+=e.vx*e.dir*dt;
    if(e.x<e.mn){e.x=e.mn;e.dir=1;}
    if(e.x+e.w>e.mx){e.x=e.mx-e.w;e.dir=-1;}
    if(!player.dead&&overlaps(player,e)){
      if(player.vy>0&&player.y+player.h<e.y+e.h*0.6){
        e.alive=false; player.vy=-320; score+=100;
        particles.push({x:e.x+16,y:e.y,vx:0,vy:-200,life:0.5,maxLife:0.5,col:'#fff',sz:10});
      } else if(player.invincible<=0){
        if(player.hasToad){
          // Perd le toad, rétrécit, devient brièvement invincible
          player.hasToad=false;
          player.y+=player.h-32;
          player.w=32; player.h=32;
          player.invincible=2;
          particles.push({x:player.x+16,y:player.y,vx:0,vy:-180,life:0.6,maxLife:0.6,col:'#ff69b4',sz:10,txt:'TOAD PERDU'});
        } else {
          player.dead=true; state='dying'; dTimer=1.5;
        }
      }
    }
  }

  // Pièces
  for(const c of coins){
    if(!c.col&&overlaps(player,c)){
      c.col=true; score+=5; coinParticle(c.x+8,c.y);
    }
  }

  // Toad items (tombent de gravité puis s'arrêtent au sol ou plateforme)
  for(const t of toadItems){
    if(t.col) continue;
    if(!t.onGround){
      t.vy+=GRAVITY*dt; t.y+=t.vy*dt;
      // Collision avec plateformes solides
      for(const p of [...platforms,...PIPES]){
        if(p.type==='brick'&&!p.intact) continue;
        if(overlaps(t,p)&&t.vy>0){ t.y=p.y-t.h; t.vy=0; t.onGround=true; break; }
      }
      if(t.y>=GY-TILE){ t.y=GY-TILE; t.vy=0; t.onGround=true; }
    }
    if(!player.dead&&overlaps(player,t)){
      t.col=true;
      player.hasToad=true;
      player.y-=48-player.h;
      player.w=48; player.h=48;
      score+=50;
      particles.push({x:player.x+24,y:player.y-8,vx:0,vy:-220,life:0.8,maxLife:0.8,col:'#ff69b4',sz:0,txt:'★ TOAD !'});
    }
  }

  // Particules
  for(const p of particles){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=350*dt; p.life-=dt; }
  particles=particles.filter(p=>p.life>0);

  draw();
}

// ============================================================
// DESSIN
// ============================================================
function di(img,x,y,w,h,flip){
  if(!img||!img.complete) return;
  if(flip){ ctx.save(); ctx.translate(x+w,y); ctx.scale(-1,1); ctx.drawImage(img,0,0,w,h); ctx.restore(); }
  else ctx.drawImage(img,x,y,w,h);
}

function drawPipe(p){
  // Corps vert sous le chapeau
  if(p.h>34){
    ctx.fillStyle='#1a6b1a';
    ctx.fillRect(p.x+4,p.y+32,p.w-8,p.h-32);
    ctx.fillStyle='#2d8b2d';
    ctx.fillRect(p.x+6,p.y+32,6,p.h-32);
  }
  // Chapeau du tuyau (texture 34×33 → 64×34)
  di(IMG.pipe,p.x,p.y,p.w,34);
}

function draw(){
  const sky=ctx.createLinearGradient(0,0,0,CH);
  sky.addColorStop(0,'#5bbce4'); sky.addColorStop(1,'#7dd4f5');
  ctx.fillStyle=sky; ctx.fillRect(0,0,CW,CH);

  ctx.save(); ctx.translate(-camX,0);

  // Nuages (59×32 → 96×52)
  for(const c of CLOUDS) di(IMG.cloud,c.x,c.y,96,52);
  // Buissons (32×32 → 64×32)
  for(const bx of BUSHES) di(IMG.bush,bx,GY-32,64,32);
  // Tuyaux
  for(const p of PIPES) drawPipe(p);
  // Château (256×256 → 210×210)
  di(IMG.castle,CASTLE_X,GY-200,210,210);
  // Mât du drapeau
  di(IMG.mat,FLAG_X+16,FLAG_Y,16,GY-FLAG_Y+TILE);
  ctx.fillStyle='#FFD700';
  ctx.beginPath(); ctx.arc(FLAG_X+24,FLAG_Y,8,0,Math.PI*2); ctx.fill();
  // Diplôme (128×63 → 64×31)
  const t=Date.now()/1000, bob=Math.sin(t*3)*4;
  di(IMG.diplome,DIP_X,DIP_Y+bob,64,31);

  // Plateformes
  for(const p of platforms){
    if(p.type==='ground') di(IMG.ground,p.x,p.y,p.w,p.h);
    else if(p.type==='brick'){ if(p.intact) di(IMG.brick,p.x,p.y,p.w,p.h); }
    else if(p.type==='qmark') di(p.hit?IMG.block:IMG.qmark,p.x,p.y,p.w,p.h);
  }

  // Pièces (animation bobbing)
  const cb=Math.sin(Date.now()/300)*2;
  for(const c of coins){
    if(c.col) continue;
    const cx=c.x+8, cy=c.y+8+cb;
    ctx.fillStyle='#FFD700';
    ctx.beginPath(); ctx.ellipse(cx,cy,7,8,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FFC200';
    ctx.beginPath(); ctx.ellipse(cx-1,cy-1,3,4.5,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#B8860B'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.ellipse(cx,cy,7,8,0,0,Math.PI*2); ctx.stroke();
  }

  // Objets Toad
  for(const t of toadItems){ if(!t.col) di(IMG.toad_item,t.x,t.y,t.w,t.h); }

  // Ennemis
  for(const e of enemies){ if(e.alive) di(IMG.enemy,e.x,e.y,e.w,e.h,e.dir<0); }

  // Particules (coordonnées monde)
  for(const p of particles){
    const alpha=Math.max(0,p.life/p.maxLife);
    ctx.globalAlpha=alpha;
    if(p.txt){
      ctx.fillStyle=p.col; ctx.font='bold 9px monospace'; ctx.textAlign='center';
      ctx.fillText(p.txt,p.x,p.y);
    } else {
      ctx.fillStyle=p.col;
      ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);
    }
    ctx.globalAlpha=1;
  }

  // Joueur
  if(!player.dead){
    const flash=player.invincible>0&&Math.floor(Date.now()/80)%2===0;
    if(!flash){
      const mImg=player.onGround?IMG.mario:IMG.mario_jump;
      di(mImg,player.x,player.y,player.w,player.h,!player.facingR);
      if(player.hasToad){
        ctx.fillStyle='#ff69b4';
        ctx.font='bold 10px monospace'; ctx.textAlign='center';
        ctx.fillText('★',player.x+player.w/2,player.y-3);
      }
    }
  }

  ctx.restore();
  hud();
  if(state==='start') scrStart();
  else if(state==='dead') scrDead();
  else if(state==='win') scrWin();
}

function hud(){
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,CW,40);
  ctx.fillStyle='#fff'; ctx.font='bold 12px monospace'; ctx.textAlign='left';
  ctx.fillText("SUP'JAVOUHEY",10,26);
  di(IMG.diplome,CW/2-52,8,36,18);
  ctx.fillStyle='#fff'; ctx.font='bold 12px monospace'; ctx.textAlign='left';
  ctx.fillText('x'+score,CW/2-12,24);
  if(player&&player.hasToad){
    di(IMG.toad_item,CW/2+55,4,32,32);
    ctx.fillStyle='#ff69b4'; ctx.font='bold 10px monospace'; ctx.textAlign='left';
    ctx.fillText('TOAD',CW/2+90,22);
  }
  const pct=Math.min(1,(player?player.x:0)/(LW-200));
  ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.fillRect(CW-160,10,140,14);
  ctx.fillStyle='#ffe000'; ctx.fillRect(CW-160,10,140*pct,14);
  ctx.fillStyle='#fff'; ctx.font='8px monospace'; ctx.textAlign='center';
  ctx.fillText('PROGRESSION',CW-90,30);
}

function overlay(a){ ctx.fillStyle=`rgba(0,0,0,${a})`; ctx.fillRect(0,0,CW,CH); }

function scrStart(){
  overlay(0.55);
  ctx.fillStyle='rgba(0,0,60,0.82)';
  ctx.fillRect(CW/2-280,CH/2-145,560,315);
  ctx.strokeStyle='#ffe000'; ctx.lineWidth=4;
  ctx.strokeRect(CW/2-280,CH/2-145,560,315);
  ctx.fillStyle='#ffe000'; ctx.font='bold 20px monospace'; ctx.textAlign='center';
  ctx.fillText('CÉRÉMONIE DES DIPLÔMES',CW/2,CH/2-105);
  ctx.fillStyle='#fff'; ctx.font='bold 14px monospace';
  ctx.fillText("SUP'JAVOUHEY",CW/2,CH/2-75);
  di(IMG.mario,CW/2-16,CH/2-65,32,32);
  ctx.fillStyle='#aaffaa'; ctx.font='11px monospace';
  ctx.fillText('Attrape le diplôme pour finir le niveau !',CW/2,CH/2-10);
  ctx.fillStyle='#ffd700'; ctx.font='10px monospace';
  ctx.fillText('★ Bloc ? → 15% chance TOAD : protège 1 dégât + taille ×1.5',CW/2,CH/2+12);
  ctx.fillText('Pièces +5  |  Ennemis +100  |  Bloc ? +10  |  Briques cassées (grand) +20',CW/2,CH/2+30);
  const blink=Math.floor(Date.now()/500)%2;
  ctx.fillStyle=blink?'#ffe000':'rgba(255,224,0,0.3)';
  ctx.font='bold 13px monospace';
  ctx.fillText('▶  APPUIE SUR ESPACE / TAP POUR COMMENCER  ◀',CW/2,CH/2+72);
  ctx.fillStyle='#ccc'; ctx.font='9px monospace';
  ctx.fillText('← → bouger  |  ↑ / ESPACE sauter  |  Sauter sur les ennemis',CW/2,CH/2+100);
  ctx.fillText('Quand GRAND : casser les briques par en dessous !',CW/2,CH/2+115);
}

function scrDead(){
  overlay(0.65);
  ctx.fillStyle='#ff3333'; ctx.font='bold 30px monospace'; ctx.textAlign='center';
  ctx.fillText('GAME OVER',CW/2,CH/2-20);
  ctx.fillStyle='#fff'; ctx.font='13px monospace';
  ctx.fillText('Score final : '+score,CW/2,CH/2+20);
  const blink=Math.floor(Date.now()/500)%2;
  ctx.fillStyle=blink?'#ffe000':'rgba(255,224,0,0.3)';
  ctx.font='bold 12px monospace';
  ctx.fillText('▶  ESPACE / TAP POUR RECOMMENCER  ◀',CW/2,CH/2+60);
}

function scrWin(){
  overlay(0.65);
  ctx.fillStyle='rgba(0,0,60,0.85)';
  ctx.fillRect(CW/2-300,CH/2-160,600,320);
  ctx.strokeStyle='#ffe000'; ctx.lineWidth=4;
  ctx.strokeRect(CW/2-300,CH/2-160,600,320);
  ctx.fillStyle='#ffe000'; ctx.font='bold 26px monospace'; ctx.textAlign='center';
  ctx.fillText('FÉLICITATIONS !',CW/2,CH/2-110);
  ctx.fillStyle='#fff'; ctx.font='14px monospace';
  ctx.fillText('Tu as obtenu ton DIPLÔME !',CW/2,CH/2-75);
  di(IMG.diplome,CW/2-32,CH/2-58,64,31);
  ctx.fillStyle='#aaffaa'; ctx.font='12px monospace';
  ctx.fillText('Rendez-vous à la cérémonie !',CW/2,CH/2+30);
  ctx.fillStyle='#ffe000'; ctx.font='bold 12px monospace';
  ctx.fillText('XX/XX/2026  —  18:00',CW/2,CH/2+55);
  ctx.fillStyle='#fff'; ctx.font='11px monospace';
  ctx.fillText("SUP'JAVOUHEY",CW/2,CH/2+78);
  ctx.fillText('Score final : '+score,CW/2,CH/2+100);
  const blink=Math.floor(Date.now()/500)%2;
  ctx.fillStyle=blink?'#ffe000':'rgba(255,224,0,0.3)';
  ctx.font='bold 11px monospace';
  ctx.fillText('▶  ESPACE / TAP POUR REJOUER  ◀',CW/2,CH/2+135);
}

// ============================================================
// INTERACTIONS
// ============================================================
function handleAction(){
  if(state==='start') state='playing';
  else if(state==='dead'){ init(); state='playing'; }
  else if(state==='win') { init(); state='playing'; }
}
window.addEventListener('keydown',e=>{ if(e.code==='Space'||e.code==='Enter') handleAction(); });
canvas.addEventListener('click',handleAction);
canvas.addEventListener('touchstart',e=>{ e.preventDefault(); handleAction(); },{passive:false});

// ============================================================
// CHARGEMENT + DÉMARRAGE
// ============================================================
function loading(ts){
  ctx.fillStyle='#5bbce4'; ctx.fillRect(0,0,CW,CH);
  ctx.fillStyle='#fff'; ctx.font='bold 16px monospace'; ctx.textAlign='center';
  ctx.fillText('Chargement... '+loaded+'/'+total,CW/2,CH/2);
  if(loaded<total) requestAnimationFrame(loading);
}
requestAnimationFrame(loading);
function startGame(){ init(); requestAnimationFrame(update); }
</script>
