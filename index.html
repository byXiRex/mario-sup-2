<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; touch-action:none; }
body { display:flex; align-items:center; justify-content:center; }
#gw { position:relative; width:100%; height:100%; }
canvas { display:block; image-rendering:pixelated; image-rendering:crisp-edges;
         position:absolute; top:0; left:0; width:100%; height:100%; }
#tc { display:none; position:fixed; bottom:0; left:0; right:0; height:150px; pointer-events:none; z-index:100; }
.btn { position:absolute; background:rgba(255,255,255,0.22); border:3px solid rgba(255,255,255,0.5);
  border-radius:50%; pointer-events:all; cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:20px; font-weight:bold; color:white; user-select:none; -webkit-user-select:none; font-family:monospace; }
#bl { width:68px; height:68px; bottom:58px; left:20px; }
#br { width:68px; height:68px; bottom:58px; left:100px; }
#bj { width:76px; height:76px; bottom:54px; right:24px;
  background:rgba(255,60,60,0.3); border-color:rgba(255,80,80,0.7); }
@media (max-width:700px), (pointer:coarse) { #tc { display:block; } }
/* Pseudo modal */
#pseudoModal {
  display:none; position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.8); z-index:9999;
  align-items:center; justify-content:center; flex-direction:column;
}
#pseudoModal.show { display:flex; }
#pseudoBox {
  background:#000038; border:4px solid #ffe000; border-radius:12px;
  padding:32px 40px; display:flex; flex-direction:column; align-items:center; gap:16px;
  font-family:monospace; max-width:380px; width:90%;
}
#pseudoBox h2 { color:#ffe000; font-size:22px; text-align:center; }
#pseudoBox p { color:#fff; font-size:13px; text-align:center; }
#pseudoInput {
  width:100%; padding:10px; font-size:16px; font-family:monospace;
  background:#000; color:#ffe000; border:2px solid #ffe000; border-radius:6px;
  text-align:center; outline:none;
}
#pseudoSubmit {
  background:#ffe000; color:#000; border:none; padding:10px 28px;
  font-size:15px; font-family:monospace; font-weight:bold;
  border-radius:6px; cursor:pointer;
}
#pseudoSubmit:hover { background:#ffc000; }
#pseudoStatus { color:#aaffaa; font-size:12px; text-align:center; }
</style>

let loaded=0, total=Object.keys(SRC).length;

function removeBg(img, threshold=50){
  const oc=document.createElement('canvas');
  oc.width=img.width; oc.height=img.height;
  const octx=oc.getContext('2d');
  octx.drawImage(img,0,0);
  const id=octx.getImageData(0,0,oc.width,oc.height);
  const d=id.data;
  for(let i=0;i<d.length;i+=4){
    if(d[i]<threshold && d[i+1]<threshold && d[i+2]<threshold) d[i+3]=0;
  }
  octx.putImageData(id,0,0);
  const out=new Image(); out.src=oc.toDataURL(); return out;
}

function onLoad(){ if(++loaded>=total) startGame(); }

for(const k in SRC){
  const img=new Image();
  if(k==='diplome'){
    img.onload=()=>{ IMG[k]=removeBg(img,50); onLoad(); };
    img.onerror=onLoad;
  } else {
    img.onload=img.onerror=onLoad;
    IMG[k]=img;
  }
  img.src=SRC[k];
}

window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup',e=>{ keys[e.code]=false; });
const T={left:false,right:false,jump:false};
function bindBtn(id,prop){
  const el=document.getElementById(id);
  ['touchstart','mousedown'].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();T[prop]=true;},{passive:false}));
  ['touchend','mouseup','touchcancel'].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();T[prop]=false;},{passive:false}));
}
bindBtn('bl','left'); bindBtn('br','right'); bindBtn('bj','jump');
const isLeft  =()=>keys['ArrowLeft'] ||keys['KeyA']||T.left;
const isRight =()=>keys['ArrowRight']||keys['KeyD']||T.right;
const isJump  =()=>keys['Space']||keys['ArrowUp']||keys['KeyW']||T.jump;

function buildPlatforms(){
  const p=[];
  // Sol avec trous intentionnels (à partir de x=1600)
  const holes=[
    {from:1650,to:1710},   // trou 1 — sautable
    {from:2800,to:2864},   // trou 2
    {from:4200,to:4260},   // trou 3
    {from:5500,to:5556},   // trou 4
  ];
  for(let x=0;x<LW;x+=TILE){
    const inHole=holes.some(h=>x>=h.from && x<h.to);
    if(!inHole) p.push({x,y:GY,w:TILE,h:TILE*2,type:'ground'});
  }

  // BRIQUES — disposées pour éviter toute superposition avec les qmarks
  const bricks=[
    [480,GY-TILE*3,3],[640,GY-TILE*5,4],[900,GY-TILE*3,2],
    [1100,GY-TILE*4,3],[1300,GY-TILE*6,5],[1550,GY-TILE*3,2],
    [1800,GY-TILE*5,4],[2050,GY-TILE*3,3],[2250,GY-TILE*6,3],
    [2500,GY-TILE*4,5],[2750,GY-TILE*6,3],[3000,GY-TILE*3,4],
    [3300,GY-TILE*5,3],[3500,GY-TILE*7,4],[3750,GY-TILE*4,3],
    [4000,GY-TILE*3,5],[4250,GY-TILE*6,3],[4500,GY-TILE*4,4],
    [4800,GY-TILE*5,3],[5000,GY-TILE*7,5],[5300,GY-TILE*3,3],
    [5600,GY-TILE*4,4],[5850,GY-TILE*6,3],[6100,GY-TILE*3,5],
  ];
  for(const[bx,by,n] of bricks)
    for(let i=0;i<n;i++) p.push({x:bx+i*TILE,y:by,w:TILE,h:TILE,type:'brick',intact:true});

  // QMARKS — aucun ne chevauche une brique (positions ajustées)
  // Chaque qmark est placé à côté d'un groupe de briques, pas dessus
  const qmarks=[
    [580,GY-TILE*3],   // à côté brique [480,*3,3] qui finit à 576 → on met à 580+32? non, décalé
    [740,GY-TILE*5],   // à côté brique [640,*5,4] qui finit à 768 → 740 chevauchement!
    [1200,GY-TILE*4],  // à côté brique [1100,*4,3] qui finit à 1196 → ok
    [1430,GY-TILE*6],  // brique [1300,*6,5] finit à 1460 → 1430 dans briques! 
    [1618,GY-TILE*3],  // brique [1550,*3,2] finit à 1614 → juste après, ok
    [1940,GY-TILE*5],  // brique [1800,*5,4] finit à 1928 → ok
    [2146,GY-TILE*3],  // brique [2050,*3,3] finit à 2146 → exact chevauchement!
    [2596,GY-TILE*4],  // brique [2500,*4,5] finit à 2660 → dans briques!
    [2882,GY-TILE*6],  // brique [2750,*6,3] finit à 2846 → ok
    [3420,GY-TILE*5],  // brique [3300,*5,3] finit à 3396 → ok
    [3628,GY-TILE*7],  // brique [3500,*7,4] finit à 3628 → exact!
    [4160,GY-TILE*3],  // brique [4000,*3,5] finit à 4160 → exact!
    [4378,GY-TILE*6],  // brique [4250,*6,3] finit à 4346 → ok
    [4940,GY-TILE*5],  // brique [4800,*5,3] finit à 4896 → ok
    [5192,GY-TILE*7],  // brique [5000,*7,5] finit à 5160 → ok
    [5700,GY-TILE*4],  // brique [5600,*4,4] finit à 5728 → dans briques!
  ];
  // Pour éviter tous les chevauchements, on recalcule proprement
  // On va mettre les qmarks clairement EN DEHORS des ranges de briques
  const safePlatforms=[
    // Format: [x, y] — vérifiés manuellement pour ne pas chevaucher
    [560,GY-TILE*3],   // après brique 480+3*32=576? non 576. On met 576 => ok
    [768,GY-TILE*5],   // après brique 640+4*32=768 => ok (juste après)
    [1196,GY-TILE*4],  // après brique 1100+3*32=1196 => ok
    [1460,GY-TILE*6],  // après brique 1300+5*32=1460 => ok
    [1614,GY-TILE*3],  // après brique 1550+2*32=1614 => ok
    [1928,GY-TILE*5],  // après brique 1800+4*32=1928 => ok
    [2178,GY-TILE*3],  // après brique 2050+3*32=2146, +32=2178 => ok
    [2660,GY-TILE*4],  // après brique 2500+5*32=2660 => ok
    [2878,GY-TILE*6],  // après brique 2750+3*32=2846+32=2878 => ok
    [3428,GY-TILE*5],  // après brique 3300+3*32=3396+32=3428 => ok
    [3692,GY-TILE*7],  // après brique 3500+4*32=3628+64=3692 => ok
    [4192,GY-TILE*3],  // après brique 4000+5*32=4160+32=4192 => ok
    [4378,GY-TILE*6],  // après brique 4250+3*32=4346+32=4378 => ok
    [4958,GY-TILE*5],  // après brique 4800+3*32=4896+62=4958 => ok
    [5224,GY-TILE*7],  // après brique 5000+5*32=5160+64=5224 => ok
    [5792,GY-TILE*4],  // après brique 5600+4*32=5728+64=5792 => ok
  ];
  for(const[qx,qy] of safePlatforms)
    p.push({x:qx,y:qy,w:TILE,h:TILE,type:'qmark',hit:false});
  return p;
}

// ============================================================
// ÉTAT DU JEU
// ============================================================
const CASTLE_X=LW-380, DIP_X=CASTLE_X+90, DIP_Y=GY-TILE*4;
const FLAG_X=LW-490, FLAG_Y=GY-TILE*9;

let platforms,enemies,coins,toadItems,particles,player,camX,state,dTimer,score,jumpPrev;
let gameTimer=0; // chronomètre en secondes
let pseudoSent=false;

function init(){
  platforms=buildPlatforms(); enemies=buildEnemies();
  coins=buildCoins(); toadItems=[]; particles=[];
  player={x:80,y:GY-TILE,w:32,h:32,vx:0,vy:0,onGround:false,
           speed:230,jumpF:-490,dead:false,facingR:true,
           hasToad:false,invincible:0};
  camX=0; state='start'; dTimer=0; score=0; jumpPrev=false;
  gameTimer=0; pseudoSent=false;
}

// ============================================================
// PHYSIQUE
// ============================================================
function overlaps(a,b){
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

function brickParticles(bx,by){
  for(let i=0;i<6;i++) particles.push({
    x:bx+16,y:by+16,
    vx:(Math.random()-0.5)*220, vy:-Math.random()*280-80,
    life:0.7,maxLife:0.7,col:'#c0392b',sz:7
  });
}

function coinParticle(cx,cy){
  particles.push({x:cx,y:cy,vx:0,vy:-230,life:0.55,maxLife:0.55,col:'#FFD700',sz:12});
}

function resolveCol(dt){
  const solid=[...platforms,...PIPES];
  player.x+=player.vx*dt;
  for(const p of solid){
    if(p.type==='brick'&&!p.intact) continue;
    if(overlaps(player,p)){
      if(player.vx>0) player.x=p.x-player.w;
      else            player.x=p.x+p.w;
      player.vx=0;
    }
  }
  player.onGround=false;
  player.y+=player.vy*dt;
  for(const p of solid){
    if(p.type==='brick'&&!p.intact) continue;
    if(overlaps(player,p)){
      if(player.vy>0){ player.y=p.y-player.h; player.onGround=true; }
      else{
        if(p.type==='qmark'&&!p.hit){
          p.hit=true; score+=5;
          if(Math.random()<0.15){
            toadItems.push({x:p.x,y:p.y-TILE,w:TILE,h:TILE,vy:-200,onGround:false,col:false});
          } else {
            coinParticle(p.x+16,p.y); score+=5;
          }
        } else if(p.type==='brick'&&p.intact&&player.hasToad){
          p.intact=false; score+=5; brickParticles(p.x,p.y);
        }
        player.y=p.y+p.h;
      }
      player.vy=0;
    }
  }
}

// ============================================================
// BOUCLE DE JEU
// ============================================================
let lastTs=0;
function update(ts){
  requestAnimationFrame(update);
  const dt=Math.min((ts-lastTs)/1000,0.05); lastTs=ts;

  if(state==='start'||state==='win'||state==='dead'){ draw(); return; }
  if(state==='dying'){ dTimer-=dt; if(dTimer<=0) state='dead'; draw(); return; }

  // Incrémenter chrono uniquement pendant le jeu
  gameTimer+=dt;

  if(player.invincible>0) player.invincible-=dt;

  // Joueur
  if(!player.dead){
    if(isLeft())  { player.vx-=player.speed*dt*15; player.facingR=false; }
    if(isRight()) { player.vx+=player.speed*dt*15; player.facingR=true;  }
    const jNow=isJump();
    if(jNow&&!jumpPrev&&player.onGround){ player.vy=player.jumpF; player.onGround=false; }
    jumpPrev=jNow;
    player.vx=Math.max(-player.speed,Math.min(player.speed,player.vx));
    player.vx*=Math.pow(FRICTION,dt*60);
    player.vy+=GRAVITY*dt;
    resolveCol(dt);
    player.x=Math.max(0,Math.min(LW-player.w,player.x));
    if(player.y>CH+100){ player.dead=true; state='dying'; dTimer=1.5; }
    if(overlaps(player,{x:DIP_X,y:DIP_Y,w:48,h:48})){ state='win'; showPseudoModal(); }
    camX=Math.max(0,Math.min(player.x-CW/3,LW-CW));
  }

  // Ennemis
  const solidObstacles=[...PIPES,...platforms.filter(p=>p.type==='ground'||(p.type==='brick'&&p.intact)||(p.type==='qmark'))];
  for(const e of enemies){
    if(!e.alive) continue;

    if(e.type==='goomba'){
      e.x+=e.vx*e.dir*dt;
      for(const obs of PIPES){
        if(overlaps(e,obs)){
          if(e.dir>0){ e.x=obs.x-e.w; e.dir=-1; }
          else       { e.x=obs.x+obs.w; e.dir=1; }
          break;
        }
      }
      if(e.x<e.mn){e.x=e.mn;e.dir=1;}
      if(e.x+e.w>e.mx){e.x=e.mx-e.w;e.dir=-1;}

      if(!player.dead&&overlaps(player,e)){
        if(player.vy>0&&player.y+player.h<e.y+e.h*0.6){
          e.alive=false; player.vy=-320; score+=1;
          particles.push({x:e.x+16,y:e.y,vx:0,vy:-200,life:0.5,maxLife:0.5,col:'#fff',sz:10});
        } else if(player.invincible<=0){
          hitPlayer();
        }
      }
    }

    else if(e.type==='flying'){
      e.t+=dt;
      e.x+=e.vx*e.dir*dt;
      e.y=e.baseY+Math.sin(e.t*e.waveFreq*Math.PI*2)*e.amplitude;
      if(e.x<e.mn){e.x=e.mn;e.dir=1;}
      if(e.x+e.w>e.mx){e.x=e.mx-e.w;e.dir=-1;}

      if(!player.dead&&overlaps(player,e)){
        if(player.vy>0&&player.y+player.h<e.y+e.h*0.6){
          e.alive=false; player.vy=-320; score+=1;
          particles.push({x:e.x+16,y:e.y,vx:0,vy:-200,life:0.5,maxLife:0.5,col:'#88aaff',sz:10});
        } else if(player.invincible<=0){
          hitPlayer();
        }
      }
    }

    else if(e.type==='fireball'){
      e.angle+=e.speed*dt;
      e.x=e.cx+Math.cos(e.angle)*e.radius;
      e.y=e.cy+Math.sin(e.angle)*e.radius;
      // Pas de stomp sur les boules de feu — toujours mortel
      if(!player.dead&&overlaps(player,{x:e.x-e.w/2,y:e.y-e.h/2,w:e.w,h:e.h})&&player.invincible<=0){
        hitPlayer();
      }
    }
  }

  // Pièces
  for(const c of coins){
    if(!c.col&&overlaps(player,c)){
      c.col=true; score+=1; coinParticle(c.x+8,c.y);
    }
  }

  // Toad items
  for(const t of toadItems){
    if(t.col) continue;
    if(!t.onGround){
      t.vy+=GRAVITY*dt; t.y+=t.vy*dt;
      for(const p of [...platforms,...PIPES]){
        if(p.type==='brick'&&!p.intact) continue;
        if(overlaps(t,p)&&t.vy>0){ t.y=p.y-t.h; t.vy=0; t.onGround=true; break; }
      }
      if(t.y>=GY-TILE){ t.y=GY-TILE; t.vy=0; t.onGround=true; }
    }
    if(!player.dead&&overlaps(player,t)){
      t.col=true;
      player.hasToad=true;
      player.y-=48-player.h;
      player.w=48; player.h=48;
      score+=50;
      particles.push({x:player.x+24,y:player.y-8,vx:0,vy:-220,life:0.8,maxLife:0.8,col:'#ff69b4',sz:0,txt:'★ TOAD !'});
    }
  }

  // Particules
  for(const p of particles){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=350*dt; p.life-=dt; }
  particles=particles.filter(p=>p.life>0);

  draw();
}

function hitPlayer(){
  if(player.hasToad){
    player.hasToad=false;
    player.y+=player.h-32;
    player.w=32; player.h=32;
    player.invincible=2;
    particles.push({x:player.x+16,y:player.y,vx:0,vy:-180,life:0.6,maxLife:0.6,col:'#ff69b4',sz:10,txt:'TOAD PERDU'});
  } else {
    player.dead=true; state='dying'; dTimer=1.5;
  }
}

// DESSIN
// ============================================================
function di(img,x,y,w,h,flip){
  if(!img||!img.complete) return;
  if(flip){ ctx.save(); ctx.translate(x+w,y); ctx.scale(-1,1); ctx.drawImage(img,0,0,w,h); ctx.restore(); }
  else ctx.drawImage(img,x,y,w,h);
}

// Tuyau dessiné entièrement en procédural (style Mario)
function drawPipe(p){
  const px=p.x, py=p.y, pw=p.w, ph=p.h;
  ctx.fillStyle='#1a7a1a';
  ctx.fillRect(px+4,py+32,pw-8,ph-32);
  ctx.fillStyle='#22a022';
  ctx.fillRect(px+5,py+32,7,ph-32);
  ctx.fillStyle='#115511';
  ctx.fillRect(px+pw-10,py+32,6,ph-32);
  ctx.fillStyle='#0a2e0a';
  ctx.fillRect(px+4,py+32,1,ph-32);
  ctx.fillRect(px+pw-5,py+32,1,ph-32);
  ctx.fillStyle='#0a2e0a';
  ctx.fillRect(px,py,pw,34);
  ctx.fillStyle='#1a7a1a';
  ctx.fillRect(px+1,py+1,pw-2,32);
  ctx.fillStyle='#22a022';
  ctx.fillRect(px+2,py+2,10,28);
  ctx.fillStyle='#115511';
  ctx.fillRect(px+pw-11,py+2,9,28);
  ctx.fillStyle='#44cc44';
  ctx.fillRect(px+2,py+2,pw-4,3);
}

// Goomba procédural
function drawGoomba(e){
  const x=Math.floor(e.x), y=Math.floor(e.y), w=e.w, h=e.h;
  const s=w/32;
  ctx.fillStyle='#8B4513';
  ctx.fillRect(x+2*s, y+14*s, 28*s, 16*s);
  ctx.fillStyle='#9B5523';
  ctx.fillRect(x,     y+4*s,  32*s, 14*s);
  ctx.fillRect(x+2*s, y+2*s,  28*s, 2*s);
  ctx.fillRect(x+4*s, y,      24*s, 2*s);
  ctx.fillStyle='#6B3210';
  ctx.fillRect(x,     y+16*s, 32*s, 2*s);
  ctx.fillStyle='#C87C40';
  ctx.fillRect(x+6*s, y+2*s,  8*s,  8*s);
  ctx.fillRect(x+18*s,y+2*s,  8*s,  8*s);
  ctx.fillStyle='#FFFFFF';
  ctx.fillRect(x+4*s, y+6*s,  8*s,  7*s);
  ctx.fillRect(x+20*s,y+6*s,  8*s,  7*s);
  ctx.fillStyle='#111111';
  ctx.fillRect(x+6*s, y+8*s,  4*s,  4*s);
  ctx.fillRect(x+22*s,y+8*s,  4*s,  4*s);
  ctx.fillStyle='#3B1A00';
  ctx.fillRect(x+3*s, y+5*s,  9*s,  2*s);
  ctx.fillRect(x+20*s,y+5*s,  9*s,  2*s);
  ctx.fillStyle='#FFFFFF';
  ctx.fillRect(x+8*s, y+18*s, 4*s,  5*s);
  ctx.fillRect(x+20*s,y+18*s, 4*s,  5*s);
  ctx.fillStyle='#3B1A00';
  ctx.fillRect(x+2*s, y+28*s, 12*s, 4*s);
  ctx.fillRect(x+18*s,y+28*s, 12*s, 4*s);
  ctx.fillStyle='#5A2A00';
  ctx.fillRect(x+2*s, y+26*s, 12*s, 2*s);
  ctx.fillRect(x+18*s,y+26*s, 12*s, 2*s);
}

// Ennemi volant (chauve-souris fantôme pixel art)
function drawFlying(e){
  const x=Math.floor(e.x), y=Math.floor(e.y), w=e.w, h=e.h;
  const t=Date.now()/200;
  const wingFlap=Math.sin(t)*0.3; // animation ailes
  // Corps violet
  ctx.fillStyle='#6633aa';
  ctx.beginPath();
  ctx.ellipse(x+w/2,y+h*0.55,w*0.28,h*0.3,0,0,Math.PI*2);
  ctx.fill();
  // Aile gauche
  ctx.fillStyle='#8844cc';
  ctx.beginPath();
  ctx.moveTo(x+w/2-4,y+h*0.45);
  ctx.quadraticCurveTo(x,y+h*(0.1+wingFlap),x-4,y+h*0.5);
  ctx.quadraticCurveTo(x+2,y+h*0.7,x+w/2-4,y+h*0.6);
  ctx.fill();
  // Aile droite
  ctx.beginPath();
  ctx.moveTo(x+w/2+4,y+h*0.45);
  ctx.quadraticCurveTo(x+w,y+h*(0.1+wingFlap),x+w+4,y+h*0.5);
  ctx.quadraticCurveTo(x+w-2,y+h*0.7,x+w/2+4,y+h*0.6);
  ctx.fill();
  // Yeux rouges
  ctx.fillStyle='#ff2222';
  ctx.beginPath(); ctx.arc(x+w/2-5,y+h*0.48,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+w/2+5,y+h*0.48,3,0,Math.PI*2); ctx.fill();
  // Pupilles
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.arc(x+w/2-5,y+h*0.49,1.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+w/2+5,y+h*0.49,1.5,0,Math.PI*2); ctx.fill();
  // Crocs
  ctx.fillStyle='#fff';
  ctx.fillRect(x+w/2-5,y+h*0.66,3,4);
  ctx.fillRect(x+w/2+2,y+h*0.66,3,4);
}

// Boule de feu orbitale
function drawFireball(e){
  if(!isFinite(e.x)||!isFinite(e.y)||!isFinite(e.w)||e.w<=0) return;
  const px=Math.floor(e.x), py=Math.floor(e.y);
  // Traînée
  for(let i=1;i<=5;i++){
    const ta=e.angle-i*0.15;
    const tx=e.cx+Math.cos(ta)*e.radius;
    const ty=e.cy+Math.sin(ta)*e.radius;
    ctx.globalAlpha=0.15*(6-i)/5;
    ctx.fillStyle='#ff6600';
    ctx.beginPath(); ctx.arc(tx,ty,e.w/2*(1-i*0.12),0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  // Halo
  const grd=ctx.createRadialGradient(px,py,2,px,py,e.w);
  grd.addColorStop(0,'#ffffff');
  grd.addColorStop(0.3,'#ffdd00');
  grd.addColorStop(0.7,'#ff4400');
  grd.addColorStop(1,'rgba(255,40,0,0)');
  ctx.fillStyle=grd;
  ctx.beginPath(); ctx.arc(px,py,e.w,0,Math.PI*2); ctx.fill();
  // Centre
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(px,py,e.w*0.35,0,Math.PI*2); ctx.fill();
}

function draw(){
  const sky=ctx.createLinearGradient(0,0,0,CH);
  sky.addColorStop(0,'#5bbce4'); sky.addColorStop(1,'#7dd4f5');
  ctx.fillStyle=sky; ctx.fillRect(0,0,CW,CH);

  ctx.save(); ctx.translate(-camX,0);

  // Nuages
  for(const c of CLOUDS) di(IMG.cloud,c.x,c.y,96,52);
  // Buissons
  for(const bx of BUSHES) di(IMG.bush,bx,GY-32,64,32);
  // Indicateurs de trous (bords)
  for(const h of HOLES){
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(h.from,GY,h.to-h.from,TILE*2);
  }
  // Tuyaux
  for(const p of PIPES) drawPipe(p);
  // Château
  di(IMG.castle,CASTLE_X,GY-200,210,210);
  // Mât du drapeau
  di(IMG.mat,FLAG_X+16,FLAG_Y,16,GY-FLAG_Y+TILE);
  ctx.fillStyle='#FFD700';
  ctx.beginPath(); ctx.arc(FLAG_X+24,FLAG_Y,8,0,Math.PI*2); ctx.fill();
  // Diplôme flottant
  const t=Date.now()/1000, bob=Math.sin(t*3)*4;
  di(IMG.diplome,DIP_X,DIP_Y+bob,48,48);

  // Plateformes
  for(const p of platforms){
    if(p.type==='ground') di(IMG.ground,p.x,p.y,p.w,p.h);
    else if(p.type==='brick'){ if(p.intact) di(IMG.brick,p.x,p.y,p.w,p.h); }
    else if(p.type==='qmark') di(p.hit?IMG.block:IMG.qmark,p.x,p.y,p.w,p.h);
  }

  // Pièces
  const cb=Math.sin(Date.now()/300)*2;
  for(const c of coins){
    if(c.col) continue;
    const cx=c.x+8, cy=c.y+8+cb;
    ctx.fillStyle='#FFD700';
    ctx.beginPath(); ctx.ellipse(cx,cy,7,8,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FFC200';
    ctx.beginPath(); ctx.ellipse(cx-1,cy-1,3,4.5,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#B8860B'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.ellipse(cx,cy,7,8,0,0,Math.PI*2); ctx.stroke();
  }

  // Objets Toad
  for(const t of toadItems){ if(!t.col) di(IMG.toad_item,t.x,t.y,t.w,t.h); }

  // Ennemis
  for(const e of enemies){
    if(!e.alive) continue;
    if(e.type==='goomba') drawGoomba(e);
    else if(e.type==='flying') drawFlying(e);
    else if(e.type==='fireball') drawFireball(e);
  }

  // Particules
  for(const p of particles){
    const alpha=Math.max(0,p.life/p.maxLife);
    ctx.globalAlpha=alpha;
    if(p.txt){
      ctx.fillStyle=p.col; ctx.font='bold 9px monospace'; ctx.textAlign='center';
      ctx.fillText(p.txt,p.x,p.y);
    } else {
      ctx.fillStyle=p.col;
      ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);
    }
    ctx.globalAlpha=1;
  }

  // Joueur
  if(!player.dead){
    const flash=player.invincible>0&&Math.floor(Date.now()/80)%2===0;
    if(!flash){
      const mImg=player.onGround?IMG.mario:IMG.mario_jump;
      di(mImg,player.x,player.y,player.w,player.h,!player.facingR);
      if(player.hasToad){
        ctx.fillStyle='#ff69b4';
        ctx.font='bold 10px monospace'; ctx.textAlign='center';
        ctx.fillText('★',player.x+player.w/2,player.y-3);
      }
    }
  }

  ctx.restore();
  hud();
  if(state==='start') scrStart();
  else if(state==='dead') scrDead();
  else if(state==='win') scrWin();
}

function formatTime(s){
  const m=Math.floor(s/60);
  const sec=Math.floor(s%60);
  const ms=Math.floor((s%1)*100);
  return `${m}:${String(sec).padStart(2,'0')}.${String(ms).padStart(2,'0')}`;
}

function hud(){
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,CW,42);
  ctx.fillStyle='#fff'; ctx.font='bold 12px monospace'; ctx.textAlign='left';
  ctx.fillText("SUP'JAVOUHEY",10,26);
  if(IMG.diplome&&IMG.diplome.complete) di(IMG.diplome,CW/2-42,5,32,32);
  ctx.fillStyle='#ffe000'; ctx.font='bold 13px monospace'; ctx.textAlign='left';
  ctx.fillText('x'+score,CW/2-6,26);
  // Chronomètre
  ctx.fillStyle='#aaffff'; ctx.font='bold 12px monospace'; ctx.textAlign='center';
  ctx.fillText('⏱ '+formatTime(gameTimer),CW/2+140,26);
  if(player&&player.hasToad){
    di(IMG.toad_item,CW/2+65,4,32,32);
    ctx.fillStyle='#ff69b4'; ctx.font='bold 10px monospace'; ctx.textAlign='left';
    ctx.fillText('TOAD',CW/2+100,22);
  }
  const pct=Math.min(1,(player?player.x:0)/(LW-200));
  ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.fillRect(CW-160,12,140,14);
  ctx.fillStyle='#ffe000'; ctx.fillRect(CW-160,12,140*pct,14);
  ctx.fillStyle='#fff'; ctx.font='8px monospace'; ctx.textAlign='center';
  ctx.fillText('PROGRESSION',CW-90,32);
}

function overlay(a){ ctx.fillStyle=`rgba(0,0,0,${a})`; ctx.fillRect(0,0,CW,CH); }

  di(IMG.mario,CW/2-16,CH/2-70,32,32);

  ctx.fillStyle='#ffd700'; ctx.font='10px monospace';

  const blink=Math.floor(Date.now()/500)%2;
  ctx.fillStyle=blink?'#ffe000':'rgba(255,224,0,0.3)';
  ctx.font='bold 13px monospace';
  ctx.fillText('▶  APPUIE SUR ESPACE / TAP POUR COMMENCER  ◀',CW/2,CH/2+60);
  ctx.fillStyle='#ccc'; ctx.font='9px monospace';
  ctx.fillText('← → bouger  |  ↑ / ESPACE sauter  |  Sauter sur les Goomba et volants',CW/2,CH/2+88);
  ctx.fillText('Quand GRAND : casser les briques par en dessous !',CW/2,CH/2+103);
  ctx.fillText('⚡ Boules de feu = TOUJOURS mortelles',CW/2,CH/2+118);
}

function scrDead(){
  overlay(0.65);
  ctx.fillStyle='#ff3333'; ctx.font='bold 30px monospace'; ctx.textAlign='center';
  ctx.fillText('GAME OVER',CW/2,CH/2-30);
  ctx.fillStyle='#fff'; ctx.font='13px monospace';
  ctx.fillText('Score final : '+score,CW/2,CH/2+10);
  ctx.fillStyle='#aaffff'; ctx.font='12px monospace';
  ctx.fillText('Temps : '+formatTime(gameTimer),CW/2,CH/2+32);
  const blink=Math.floor(Date.now()/500)%2;
  ctx.fillStyle=blink?'#ffe000':'rgba(255,224,0,0.3)';
  ctx.font='bold 12px monospace';
  ctx.fillText('▶  ESPACE / TAP POUR RECOMMENCER  ◀',CW/2,CH/2+68);
}

function scrWin(){
  overlay(0.65);
  ctx.fillStyle='rgba(0,0,60,0.85)';
  ctx.fillRect(CW/2-300,CH/2-160,600,320);
  ctx.strokeStyle='#ffe000'; ctx.lineWidth=4;
  ctx.strokeRect(CW/2-300,CH/2-160,600,320);
  ctx.fillStyle='#ffe000'; ctx.font='bold 26px monospace'; ctx.textAlign='center';
  ctx.fillText('FÉLICITATIONS !',CW/2,CH/2-110);
  ctx.fillStyle='#fff'; ctx.font='14px monospace';
  ctx.fillText('Tu as obtenu ton DIPLÔME !',CW/2,CH/2-75);
  if(IMG.diplome&&IMG.diplome.complete) di(IMG.diplome,CW/2-40,CH/2-65,80,80);
  ctx.fillStyle='#aaffaa'; ctx.font='12px monospace';
  ctx.fillText('Rendez-vous à la cérémonie !',CW/2,CH/2+30);
  ctx.fillStyle='#aaffff'; ctx.font='bold 13px monospace';
  ctx.fillText('⏱ Temps : '+formatTime(gameTimer),CW/2,CH/2+52);
  ctx.fillStyle='#ffe000'; ctx.font='bold 12px monospace';
  ctx.fillText('Score : '+score,CW/2,CH/2+75);
  ctx.fillStyle='#fff'; ctx.font='11px monospace';
  ctx.fillText("SUP'JAVOUHEY",CW/2,CH/2+98);
  const blink=Math.floor(Date.now()/500)%2;
  ctx.fillStyle=blink?'#ffe000':'rgba(255,224,0,0.3)';
  ctx.font='bold 11px monospace';
  ctx.fillText('▶  ESPACE / TAP POUR REJOUER  ◀',CW/2,CH/2+135);

// ============================================================
// MODAL PSEUDO + WEBHOOK
// ============================================================
function showPseudoModal(){
  if(pseudoSent) return;
  const modal=document.getElementById('pseudoModal');
  modal.classList.add('show');
  const input=document.getElementById('pseudoInput');
  input.value='';
  input.focus();
}

function submitPseudo(){
  const modal=document.getElementById('pseudoModal');
  const input=document.getElementById('pseudoInput');
  const status=document.getElementById('pseudoStatus');
  const pseudo=input.value.trim();
  if(!pseudo){ input.focus(); return; }
  pseudoSent=true;
  modal.classList.remove('show');
  sendWebhook(pseudo);
}

document.getElementById('pseudoSubmit').addEventListener('click',submitPseudo);
document.getElementById('pseudoInput').addEventListener('keydown',e=>{
  if(e.key==='Enter') submitPseudo();
});

function sendWebhook(pseudo){
  const now=new Date();
  const dateStr=now.toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const timeStr=now.toLocaleTimeString('fr-FR');
  const timeGame=formatTime(gameTimer);
  const embed={
    title:'🎓 Nouveau Diplômé !',
    color:0xFFE000,
    fields:[
      {name:'👤 Pseudo',value:pseudo,inline:true},
      {name:'⏱ Temps',value:timeGame,inline:true},
      {name:'🏆 Score',value:String(score),inline:true},
      {name:'📅 Date',value:dateStr,inline:false},
      {name:'🕐 Heure',value:timeStr,inline:true},
      {name:'🎮 Niveau',value:"SUP'JAVOUHEY — Cérémonie des Diplômes",inline:false},
    ],
    footer:{text:"Jeu SUP'JAVOUHEY • Cérémonie des Diplômes 2026"},
    timestamp:now.toISOString()
  };
  fetch('https://discord.com/api/webhooks/1498370378018590951/Zy6OsBEUafphAFCq0GOPKbF8CaDOZl2iyYMNxJ3yK2uRrlgICGliKOGs_voesiHJ8I6i',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:"Cérémonie des Diplômes",avatar_url:"",embeds:[embed]})
  }).catch(()=>{});
}

// ============================================================
// INTERACTIONS
// ============================================================
function handleAction(){
  if(state==='start') state='playing';
  else if(state==='dead'){ init(); state='playing'; }
  else if(state==='win') { init(); state='playing'; }
}
window.addEventListener('keydown',e=>{ if(e.code==='Space'||e.code==='Enter') handleAction(); });
canvas.addEventListener('click',handleAction);
canvas.addEventListener('touchstart',e=>{ e.preventDefault(); handleAction(); },{passive:false});

// ============================================================
// CHARGEMENT + DÉMARRAGE
// ============================================================
function loading(ts){
  ctx.fillStyle='#5bbce4'; ctx.fillRect(0,0,CW,CH);
  ctx.fillStyle='#fff'; ctx.font='bold 16px monospace'; ctx.textAlign='center';
  ctx.fillText('Chargement... '+loaded+'/'+total,CW/2,CH/2);
  if(loaded<total) requestAnimationFrame(loading);
}
requestAnimationFrame(loading);
function startGame(){ init(); requestAnimationFrame(update); }
